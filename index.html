function useDebounce(val, ms) {
  const [dv,setDv]=useState(val);
  useEffect(()=>{ const t=setTimeout(()=>setDv(val),ms); return ()=>clearTimeout(t); },[val,ms]);
  return dv;
}

// ── TDEE Calculator ───────────────────────────────────────────────────────────
function calcTDEE({ sex, age, weight, height, activity, goal }) {
  const bmr = (10*weight) + (6.25*height) - (5*age) + (sex==='male' ? 5 : -161);
  const mult = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryactive:1.9 }[activity] || 1.55;
  const adj  = { lose:-500, maintain:0, gain:300 }[goal] || 0;
  const calories = rnd(bmr * mult + adj);
  const protein  = rnd(weight * 2.0);
  const fat      = rnd((calories * 0.27) / 9);
  const carbs    = Math.max(0, rnd((calories - protein*4 - fat*9) / 4));
  return { calories, protein, carbs, fat };
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(messages, apiKey) {
  const system = `You are a nutrition assistant. Respond ONLY with valid JSON:
{"meals":[{"name":"string","mealType":"Breakfast|Lunch|Dinner|Snack","calories":number,"protein":number,"carbs":number,"fat":number,"notes":"string"}],"message":"string"}
Round all numbers. Use realistic portions. Group items as one meal unless clearly separate occasions. If unclear: {"meals":[],"message":"clarifying question"}.`;
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system,messages})
  });
  if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`Error ${res.status}`); }
  const data=await res.json();
  const m=data.content[0].text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('Invalid response');
  return JSON.parse(m[0]);
}

async function searchOFF(query) {
  const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=8&sort_by=unique_scans_n`);
  if(!res.ok) return [];
  const data=await res.json();
  return (data.products||[]).filter(p=>{
    const n=p.nutriments;
    return p.product_name?.trim()&&n&&(n['energy-kcal_100g']||n['energy_100g']);
  }).map(p=>{
    const n=p.nutriments;
    const cal=n['energy-kcal_100g']||rnd((n['energy_100g']||0)/4.184);
    const sg=parseFloat(p.serving_size)||null;
    return { id:'off_'+(p.code||Math.random()), name:p.product_name.trim(), cat:'Database',
      cal:rnd(cal), p:rnd(n['proteins_100g']||0), c:rnd(n['carbohydrates_100g']||0), f:rnd(n['fat_100g']||0),
      sv:sg?[{l:`1 serving (${p.serving_size})`,g:sg},{l:'100 g',g:100}]:[{l:'100 g',g:100}], source:'off' };
  }).slice(0,6);
}

// ── FoodSearch ────────────────────────────────────────────────────────────────
function FoodSearch({ onLog }) {
  const [query,setQuery]=useState('');
  const [offRes,setOffRes]=useState([]);
  const [offLoading,setOffLoading]=useState(false);
  const [selId,setSelId]=useState(null);
  const dq=useDebounce(query,400);
  const builtin=useMemo(()=>dbSearch(dq),[dq]);

  useEffect(()=>{
    if(!dq.trim()||dq.length<2){setOffRes([]);return;}
    setOffLoading(true);
    searchOFF(dq).then(setOffRes).catch(()=>setOffRes([])).finally(()=>setOffLoading(false));
  },[dq]);

  const results=[...builtin,...offRes.filter(o=>!builtin.some(b=>b.name.toLowerCase()===o.name.toLowerCase()))];

  const handleLog=food=>{
    onLog({...food,id:Date.now()+Math.random(),date:todayISO(),time:nowTime()});

  return html`
    <div style=${{padding:16}}>

        <span style=${{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</span>

      ${!query?html`
        <div style=${{textAlign:'center',padding:'44px 0'}}>
          <div style=${{fontSize:52,marginBottom:12}}>🥦🍗🍌</div>
          <p style=${{fontSize:16,fontWeight:700,color:'#374151',margin:'0 0 4px'}}>Search 53 common foods</p>
          <p style=${{fontSize:13,color:'#9ca3af'}}>Instant results · Packaged foods from Open Food Facts</p>

      `:results.length===0&&!offLoading?html`

          <div style=${{fontSize:44,marginBottom:10}}>🤷</div>
          <p style=${{fontSize:14,color:'#374151',margin:'0 0 4px'}}>No results for "${query}"</p>

              <button onClick=${()=>setSelId(selId===food.id?null:food.id)}
                style=${{width:'100%',textAlign:'left',padding:'13px 16px',background:'none',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                  <p style=${{fontSize:14,fontWeight:700,color:'#111827',margin:'0 0 3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${CAT_EMOJI[food.cat]||'🍽️'} ${food.name}</p>
                  <p style=${{fontSize:12,color:'#9ca3af',margin:0}}>${food.cat} · ${food.cal} kcal/100 g · 💪${food.p}g · 🌾${food.c}g · 🥑${food.f}g</p>
                </div>
                <div style=${{display:'flex',alignItems:'center',gap:8,marginLeft:10,flexShrink:0}}>

                    ?html`<span style=${{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:6,background:'#eff6ff',color:'#3b82f6'}}>OFF</span>`

// ── ChatLogger ────────────────────────────────────────────────────────────────
function ChatLogger({ apiKey, onLog }) {
  const [msgs,setMsgs]=useState([
    {role:'assistant',content:'Hi! 👋 Describe what you ate and I\'ll estimate the nutrition. Try: "bowl of oatmeal with blueberries and an oat milk latte" or "grilled chicken salad with avocado, medium portion."',meals:null}
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoad]=useState(false);
  const [pending,setPend]=useState([]);
  const endRef=useRef(null);
  const inpRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  const history=msgs.slice(1).map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}));

  const send=async()=>{
    const text=input.trim(); if(!text||loading) return;
    setInput('');
    setMsgs(m=>[...m,{role:'user',content:text}]);
    setLoad(true);
    try {
      const r=await callClaude([...history,{role:'user',content:text}],apiKey);
      setMsgs(m=>[...m,{role:'assistant',content:r.message,meals:r.meals?.length?r.meals:null}]);
      if(r.meals?.length) setPend(r.meals);
    } catch(e) {
      setMsgs(m=>[...m,{role:'assistant',content:'⚠️ Error: '+e.message,meals:null}]);
    } finally { setLoad(false); inpRef.current?.focus(); }
  };

  const logAll=()=>{
    const time=nowTime(),date=todayISO();
    pending.forEach(m=>onLog({...m,id:Date.now()+Math.random(),date,time,source:'ai'}));
    const n=pending.length, name=pending[0]?.name||'Meal';
    setPend([]);
    setMsgs(m=>[...m,{role:'assistant',content:`✅ Logged! ${n===1?name:n+' meals'} added to today. Anything else?`,meals:null}]);
  };

  return html`
    <div style=${{display:'flex',flexDirection:'column',height:'calc(100vh - 170px)'}}>
      <div style=${{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>
        ${msgs.map((msg,i)=>html`
          <div key=${i} style=${{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start'}}>
            <div style=${{maxWidth:'85%'}}>
              ${msg.role==='assistant'?html`
                <div style=${{display:'flex',alignItems:'flex-start',gap:8}}>
                  <div style=${{width:32,height:32,borderRadius:99,background:'linear-gradient(135deg,#16a34a,#065f46)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,marginTop:2}}>🤖</div>
                  <div style=${{flex:1}}>
                    <div className="ai-bubble" style=${{padding:'10px 14px',fontSize:14,lineHeight:1.55}}>${msg.content}</div>
                    ${msg.meals?.length?html`
                      <div style=${{marginTop:8}}>
                        ${msg.meals.map((m,mi)=>html`
                          <div key=${mi} className="card" style=${{padding:'12px 14px',marginBottom:6}}>
                            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                              <div>
                                <${TypeBadge} type=${m.mealType} />
                                <p style=${{fontSize:14,fontWeight:700,color:'#111827',margin:'5px 0 0'}}>${m.name}</p>
                                ${m.notes?html`<p style=${{fontSize:11,color:'#9ca3af',fontStyle:'italic',margin:'2px 0 0'}}>${m.notes}</p>`:null}
                              </div>
                              <span style=${{fontSize:18,fontWeight:800,color:'#111827',marginLeft:10,flexShrink:0}}>${m.calories}<span style=${{fontSize:11,fontWeight:500,color:'#9ca3af'}}> kcal</span></span>
                            </div>
                            <div style=${{display:'flex',gap:12,marginTop:8,fontSize:12}}>
                              <span style=${{color:'#3b82f6',fontWeight:700}}>💪 ${m.protein}g</span>
                              <span style=${{color:'#f97316',fontWeight:700}}>🌾 ${m.carbs}g</span>
                              <span style=${{color:'#eab308',fontWeight:700}}>🥑 ${m.fat}g</span>
                            </div>
                          </div>`)}
                        <div style=${{display:'flex',gap:8,marginTop:4}}>
                          <button onClick=${logAll} className="btn-primary" style=${{flex:1,padding:'10px'}}>✅ Log ${pending.length>1?'all':'this'}</button>
                          <button onClick=${()=>setPend([])} className="btn-ghost" style=${{padding:'10px 14px'}}>Edit</button>
                        </div>
                      </div>`:null}
                  </div>
                </div>
              `:html`<div className="user-bubble" style=${{padding:'10px 14px',fontSize:14,lineHeight:1.55}}>${msg.content}</div>`}
            </div>
          </div>`)}
        ${loading?html`
          <div style=${{display:'flex',alignItems:'flex-start',gap:8}}>
            <div style=${{width:32,height:32,borderRadius:99,background:'linear-gradient(135deg,#16a34a,#065f46)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🤖</div>
            <div className="ai-bubble" style=${{padding:'12px 16px',display:'flex',gap:4,alignItems:'center'}}>
              <span className="dot"></span><span className="dot"></span><span className="dot"></span>
            </div>
          </div>`:null}
        <div ref=${endRef}></div>
      </div>
      <div style=${{padding:'12px 16px',borderTop:'1px solid #f1f5f9',background:'#fff'}}>
        <div style=${{display:'flex',gap:8}}>
          <input ref=${inpRef} type="text" value=${input}
            onInput=${e=>setInput(e.target.value)}
            onKeyDown=${e=>e.key==='Enter'&&!e.shiftKey&&send()}
            placeholder="Describe what you ate…"
            style=${{flex:1}}
          />
          <button onClick=${send} disabled=${loading||!input.trim()} className="btn-primary"
            style=${{opacity:loading||!input.trim()?.4:1,transition:'opacity .2s'}}>Send</button>
        </div>
      </div>
    </div>`;
}

// ── TodayTab ──────────────────────────────────────────────────────────────────
function TodayTab({ meals, goals, onDelete }) {
  const tot=meals.reduce((a,m)=>({calories:a.calories+m.calories,protein:a.protein+m.protein,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{calories:0,protein:0,carbs:0,fat:0});
  const calPct=Math.min(100,rnd((tot.calories/goals.calories)*100));
  const remaining=Math.max(0,goals.calories-tot.calories);
  const over=tot.calories>goals.calories;
  const C=2*Math.PI*52;

  return html`
    <div style=${{padding:16}}>
      <!-- Calorie hero card -->
      <div style=${{background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:22,padding:'20px 24px',marginBottom:12,display:'flex',alignItems:'center',gap:20,color:'#fff'}}>
        <div style=${{position:'relative',flexShrink:0}}>
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="52" fill="none" stroke="rgba(255,255,255,.2)" strokeWidth="9"/>
            <circle cx="55" cy="55" r="52" fill="none"
              stroke=${over?'#fca5a5':'#bbf7d0'} strokeWidth="9"
              strokeDasharray=${`${(calPct/100*C).toFixed(1)} ${C}`}
              strokeDashoffset=${C/4}
              strokeLinecap="round"/>
          </svg>
          <div style=${{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <span style=${{fontSize:10,color:'rgba(255,255,255,.7)',fontWeight:600}}>${calPct}%</span>
            <span style=${{fontSize:22,fontWeight:900,lineHeight:1}}>🔥</span>
          </div>
        </div>
        <div style=${{flex:1}}>
          <p style=${{fontSize:12,color:'rgba(255,255,255,.75)',fontWeight:600,marginBottom:2}}>CALORIES TODAY</p>
          <p style=${{fontSize:38,fontWeight:900,letterSpacing:'-1.5px',lineHeight:1,marginBottom:4}}>${tot.calories.toLocaleString()}</p>
          <p style=${{fontSize:13,color:'rgba(255,255,255,.85)'}}>${over?`⚠️ ${(tot.calories-goals.calories).toLocaleString()} kcal over goal`:`${remaining.toLocaleString()} kcal remaining`}</p>
          <p style=${{fontSize:11,color:'rgba(255,255,255,.55)',marginTop:4}}>Goal: ${goals.calories.toLocaleString()} kcal</p>
        </div>
      </div>

      <!-- Macro cards -->
      <div style=${{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
        ${MACRO_CFG.map(cfg=>html`<${MacroBar} key=${cfg.key} cfg=${cfg} value=${tot[cfg.key]} goal=${goals[cfg.key]} />`)}
      </div>

      <!-- Meal list -->
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <p style=${{fontSize:16,fontWeight:800,color:'#111827'}}>🍽️ Meals logged</p>
        <span style=${{fontSize:13,color:'#9ca3af'}}>${meals.length} item${meals.length!==1?'s':''}</span>
      </div>
      ${meals.length===0?html`
        <div style=${{textAlign:'center',padding:'48px 0'}}>
          <div style=${{fontSize:52,marginBottom:10}}>🍽️</div>
          <p style=${{fontSize:16,fontWeight:700,color:'#374151',marginBottom:4}}>Nothing logged yet</p>
          <p style=${{fontSize:13,color:'#9ca3af'}}>Use the Log tab to add meals</p>
        </div>`
      :html`<div>${[...meals].reverse().map(m=>html`<${MealCard} key=${m.id} meal=${m} onDelete=${()=>onDelete(m.id)} />`)}</div>`}
    </div>`;
}

// ── WeekTab ───────────────────────────────────────────────────────────────────
const DAY_EMOJI = ['🌙','🌟','🌤️','🌈','⚡','🎉','😴'];
function WeekTab({ allMeals }) {
  const today=new Date(), dow=today.getDay();
  const monday=new Date(today); monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const weekDates=DAYS.map((_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d.toISOString().slice(0,10); });
  const ts=todayISO();
  return html`
    <div style=${{padding:16}}>
      <p style=${{fontSize:16,fontWeight:800,color:'#111827',marginBottom:12}}>📅 This Week</p>
      ${DAYS.map((dayName,i)=>{
        const date=weekDates[i], dayMeals=allMeals.filter(m=>m.date===date);
        const totalCal=dayMeals.reduce((s,m)=>s+m.calories,0), isToday=date===ts;
        return html`
          <div key=${dayName} className="card" style=${{marginBottom:8,padding:'13px 16px',border:isToday?'2px solid #16a34a':'2px solid transparent'}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:dayMeals.length?6:0}}>
              <div style=${{display:'flex',alignItems:'center',gap:8}}>
                <span style=${{fontSize:18}}>${DAY_EMOJI[i]}</span>
                <span style=${{fontSize:14,fontWeight:700,color:isToday?'#16a34a':'#374151'}}>${dayName}</span>
                ${isToday?html`<span style=${{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'#dcfce7',color:'#15803d'}}>Today</span>`:null}
              </div>
              ${dayMeals.length
                ?html`<span style=${{fontSize:14,fontWeight:800,color:'#16a34a'}}>${totalCal.toLocaleString()} kcal</span>`
                :html`<span style=${{fontSize:13,color:'#e2e8f0'}}>—</span>`}
            </div>
            ${dayMeals.length?html`
              <div style=${{display:'flex',flexDirection:'column',gap:3}}>
                ${MEAL_TYPES.map(type=>{
                  const tm=dayMeals.filter(m=>m.mealType===type);
                  if(!tm.length) return null;
                  const meta=MEAL_META[type];
                  return html`
                    <div key=${type} style=${{display:'flex',gap:8,fontSize:12,alignItems:'baseline'}}>
                      <span style=${{color:meta.fg,width:70,flexShrink:0,fontWeight:600}}>${meta.emoji} ${type}</span>
                      <span style=${{color:'#6b7280',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${tm.map(m=>m.name).join(', ')}</span>
                    </div>`;
                })}
              </div>`
            :html`<p style=${{fontSize:12,color:'#e2e8f0'}}>No meals logged</p>`}
          </div>`;
      })}
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
const ACTIVITY_OPTS = [
  {id:'sedentary',  label:'🛋️ Sedentary', sub:'Little or no exercise'},
  {id:'light',      label:'🚶 Light',      sub:'1–3 days/week'},
  {id:'moderate',   label:'🏃 Moderate',   sub:'3–5 days/week'},
  {id:'active',     label:'💪 Active',     sub:'6–7 days/week'},
  {id:'veryactive', label:'🏋️ Very Active', sub:'Hard daily training'},
];
const GOAL_OPTS = [
  {id:'lose',     label:'📉 Lose Weight',  sub:'−500 kcal/day'},
  {id:'maintain', label:'⚖️ Maintain',     sub:'Eat at TDEE'},
  {id:'gain',     label:'📈 Gain Muscle',  sub:'+300 kcal/day'},
];

function Settings({ onClose, apiKey, setApiKey, goals, setGoals }) {
  const [key,setKey]=useState(apiKey);
  const [g,setG]=useState(goals);
  const [calc,setCalc]=useState({ sex:'male', age:30, weight:75, height:175, activity:'moderate', goal:'maintain' });
  const [calcResult,setCalcResult]=useState(null);

  const calculate=()=>{
    const result=calcTDEE(calc);
    setCalcResult(result);
    setG(result);
  };

  const ok=()=>{ setApiKey(key.trim()); setGoals(g); onClose(); };

  const pickerBtn=(val,cur,set,opts)=>html`
    <div style=${{display:'flex',flexDirection:'column',gap:6}}>
      ${opts.map(o=>html`
        <button key=${o.id} onClick=${()=>set({...cur,[val]:o.id})} style=${{
          padding:'10px 14px',borderRadius:12,border:'2px solid',cursor:'pointer',textAlign:'left',
          borderColor:cur[val]===o.id?'#16a34a':'#e5e7eb',
          background:cur[val]===o.id?'#f0fdf4':'#fff',
          transition:'all .15s',
        }}>
          <p style=${{fontSize:13,fontWeight:700,color:cur[val]===o.id?'#16a34a':'#374151',margin:'0 0 1px'}}>${o.label}</p>
          ${o.sub?html`<p style=${{fontSize:11,color:'#9ca3af',margin:0}}>${o.sub}</p>`:null}
        </button>`)}
    </div>`;

  return html`
    <div onClick=${e=>e.target===e.currentTarget&&onClose()}
      style=${{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:50}}>
      <div style=${{background:'#fff',borderRadius:'24px 24px 0 0',padding:'20px 20px 32px',width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 -20px 60px rgba(0,0,0,.15)'}}>
        <div style=${{width:40,height:4,background:'#e5e7eb',borderRadius:99,margin:'0 auto 20px'}}></div>
        <h2 style=${{fontSize:22,fontWeight:900,color:'#111827',marginBottom:20}}>⚙️ Settings</h2>

        <!-- API Key -->
        <div style=${{marginBottom:24,padding:'16px',background:'#f8fafc',borderRadius:16}}>
          <label style=${{fontSize:13,fontWeight:700,color:'#374151',display:'block',marginBottom:8}}>
            🤖 Anthropic API Key
            <span style=${{fontWeight:400,color:'#9ca3af',marginLeft:4}}>(optional)</span>
          </label>
          <input type="password" value=${key} onInput=${e=>setKey(e.target.value)} placeholder="sk-ant-…" />
          <p style=${{fontSize:12,color:'#9ca3af',marginTop:6}}>Free tier at console.anthropic.com · Stored only in your browser</p>
        </div>

        <!-- TDEE Calculator -->
        <div style=${{marginBottom:24,background:'linear-gradient(135deg,#f0fdf4,#f0f9ff)',borderRadius:18,padding:16,border:'2px solid #bbf7d0'}}>
          <h3 style=${{fontSize:16,fontWeight:800,color:'#15803d',marginBottom:4}}>🧮 Calculate My Daily Goals</h3>
          <p style=${{fontSize:12,color:'#6b7280',marginBottom:16}}>Enter your details to auto-calculate calories and macros using the Mifflin-St Jeor formula</p>

          <!-- Sex -->
          <div style=${{marginBottom:14}}>
            <label style=${{fontSize:12,fontWeight:700,color:'#374151',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Biological Sex</label>
            <div style=${{display:'flex',gap:8}}>
              ${[['male','👨 Male'],['female','👩 Female']].map(([id,label])=>html`
                <button key=${id} onClick=${()=>setCalc(c=>({...c,sex:id}))} style=${{
                  flex:1,padding:'10px',borderRadius:12,border:'2px solid',cursor:'pointer',fontWeight:700,fontSize:13,transition:'all .15s',
                  borderColor:calc.sex===id?'#16a34a':'#e5e7eb',
                  background:calc.sex===id?'#16a34a':'#fff',
                  color:calc.sex===id?'#fff':'#374151',
                }}>${label}</button>`)}
            </div>
          </div>

          <!-- Age / Weight / Height -->
          <div style=${{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
            ${[['age','Age','yrs',99,1],['weight','Weight','kg',300,1],['height','Height','cm',250,100]].map(([key,label,unit])=>html`
              <div key=${key}>
                <label style=${{fontSize:12,fontWeight:700,color:'#374151',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.5px'}}>${label}</label>
                <div style=${{position:'relative'}}>
                  <input type="number" value=${calc[key]}
                    onInput=${e=>setCalc(c=>({...c,[key]:parseFloat(e.target.value)||0}))}
                    style=${{paddingRight:28,background:'#fff'}}
                  />
                  <span style=${{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:11,color:'#9ca3af'}}>${unit}</span>
                </div>
              </div>`)}
          </div>

          <!-- Activity -->
          <div style=${{marginBottom:14}}>
            <label style=${{fontSize:12,fontWeight:700,color:'#374151',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Activity Level</label>
            <div style=${{display:'flex',flexDirection:'column',gap:6}}>
              ${ACTIVITY_OPTS.map(o=>html`
                <button key=${o.id} onClick=${()=>setCalc(c=>({...c,activity:o.id}))} style=${{
                  padding:'9px 12px',borderRadius:12,border:'2px solid',cursor:'pointer',textAlign:'left',transition:'all .15s',
                  borderColor:calc.activity===o.id?'#16a34a':'#e5e7eb',
                  background:calc.activity===o.id?'#f0fdf4':'#fff',
                }}>
                  <span style=${{fontSize:13,fontWeight:700,color:calc.activity===o.id?'#16a34a':'#374151'}}>${o.label}</span>
                  <span style=${{fontSize:11,color:'#9ca3af',marginLeft:6}}>${o.sub}</span>
                </button>`)}
            </div>
          </div>

          <!-- Goal -->
          <div style=${{marginBottom:14}}>
            <label style=${{fontSize:12,fontWeight:700,color:'#374151',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Goal</label>
            <div style=${{display:'flex',gap:8}}>
              ${GOAL_OPTS.map(o=>html`
                <button key=${o.id} onClick=${()=>setCalc(c=>({...c,goal:o.id}))} style=${{
                  flex:1,padding:'10px 6px',borderRadius:12,border:'2px solid',cursor:'pointer',textAlign:'center',transition:'all .15s',
                  borderColor:calc.goal===o.id?'#16a34a':'#e5e7eb',
                  background:calc.goal===o.id?'#16a34a':'#fff',
                  color:calc.goal===o.id?'#fff':'#374151',
                }}>
                  <p style=${{fontSize:12,fontWeight:700,margin:'0 0 2px'}}>${o.label}</p>
                  <p style=${{fontSize:10,opacity:.75,margin:0}}>${o.sub}</p>
                </button>`)}
            </div>
          </div>

          <button onClick=${calculate} style=${{width:'100%',padding:'12px',borderRadius:14,background:'linear-gradient(135deg,#16a34a,#15803d)',color:'#fff',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',letterSpacing:'0.3px'}}>
            ⚡ Calculate & Set My Goals
          </button>

          ${calcResult?html`
            <div style=${{marginTop:12,padding:'12px 14px',background:'#fff',borderRadius:12,border:'1px solid #bbf7d0'}}>
              <p style=${{fontSize:12,fontWeight:700,color:'#15803d',marginBottom:6}}>✅ Goals updated!</p>
              <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,textAlign:'center'}}>
                ${[['🔥 Cal',calcResult.calories,'#16a34a'],['💪 Pro',calcResult.protein+'g','#3b82f6'],['🌾 Carb',calcResult.carbs+'g','#f97316'],['🥑 Fat',calcResult.fat+'g','#eab308']].map(([l,v,c])=>html`
                  <div key=${l}><p style=${{fontSize:10,color:'#9ca3af',margin:'0 0 2px'}}>${l}</p><p style=${{fontSize:14,fontWeight:800,color:c,margin:0}}>${v}</p></div>`)}
              </div>
            </div>`:null}
        </div>

        <!-- Manual goals override -->
        <div style=${{marginBottom:24,padding:16,background:'#f8fafc',borderRadius:16}}>
          <h3 style=${{fontSize:14,fontWeight:800,color:'#374151',marginBottom:12}}>🎯 Daily Goals (manual override)</h3>
          ${['calories','protein','carbs','fat'].map(k2=>html`
            <div key=${k2} style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <label style=${{fontSize:13,color:'#374151',textTransform:'capitalize',fontWeight:600}}>
                ${{ calories:'🔥 Calories', protein:'💪 Protein', carbs:'🌾 Carbs', fat:'🥑 Fat' }[k2]} ${k2==='calories'?'(kcal)':'(g)'}
              </label>
              <input type="number" value=${g[k2]}
                onInput=${e=>setG(prev=>({...prev,[k2]:parseInt(e.target.value)||0}))}
                style=${{width:90,textAlign:'right'}}
              />
            </div>`)}
        </div>

        <div style=${{display:'flex',gap:10}}>
          <button onClick=${onClose} className="btn-ghost" style=${{flex:1}}>Cancel</button>
          <button onClick=${ok} className="btn-primary" style=${{flex:2}}>💾 Save Settings</button>
        </div>
      </div>
    </div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('log');
  const [showSett,setSett]=useState(false);
  const [apiKey,setApiKey_]=useState(()=>load('apiKey',''));
  const [goals,setGoals_]=useState(()=>load('goals',GOALS_DEF));
  const [allMeals,setAllMeals]=useState(()=>load('meals',[]));

  const ts=todayISO();
  const todayMeals=allMeals.filter(m=>m.date===ts);
  const todayCal=todayMeals.reduce((s,m)=>s+m.calories,0);
  const calPct=Math.min(100,rnd((todayCal/goals.calories)*100));

  const setApiKey=k=>{setApiKey_(k);persist('apiKey',k);};
  const setGoals=g=>{setGoals_(g);persist('goals',g);};
  const addMeal=m=>setAllMeals(prev=>{const n=[...prev,m];persist('meals',n);return n;});
  const delMeal=id=>setAllMeals(prev=>{const n=prev.filter(m=>m.id!==id);persist('meals',n);return n;});

  useEffect(()=>{ if(!apiKey) setSett(true); },[]);

  return html`
    <div style=${{maxWidth:480,margin:'0 auto',minHeight:'100vh',display:'flex',flexDirection:'column',background:'#f0fdf4'}}>

      <!-- Header -->
      <div style=${{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'12px 16px',position:'sticky',top:0,zIndex:10}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h1 style=${{fontSize:22,fontWeight:900,color:'#111827',letterSpacing:'-0.5px'}}>🥗 Meal Tracker</h1>
            <p style=${{fontSize:12,color:'#9ca3af',marginTop:1}}>${todayCal.toLocaleString()} / ${goals.calories.toLocaleString()} kcal today</p>
          </div>
          <div style=${{display:'flex',alignItems:'center',gap:10}}>
            <div style=${{position:'relative',width:46,height:46}}>
              <svg width="46" height="46" viewBox="0 0 46 46">
                <circle cx="23" cy="23" r="19" fill="none" stroke="#e5e7eb" strokeWidth="4.5"/>
                <circle cx="23" cy="23" r="19" fill="none"
                  stroke=${todayCal>goals.calories?'#f87171':'#16a34a'} strokeWidth="4.5"
                  strokeDasharray=${`${(calPct/100*119.4).toFixed(1)} 119.4`}
                  strokeDashoffset="29.8"
                  strokeLinecap="round"/>
              </svg>
              <div style=${{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#374151'}}>${calPct}%</div>
            </div>
            <button onClick=${()=>setSett(true)}
              style=${{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:12,padding:'8px 10px',cursor:'pointer',fontSize:16}}>⚙️</button>
          </div>
        </div>
      </div>

      <!-- Tab bar -->
      <div style=${{background:'#fff',borderBottom:'1px solid #e5e7eb',display:'flex',padding:'0 4px'}}>
        ${[['log','🍴 Log'],['today','📊 Today'],['week','📅 Week']].map(([id,label])=>html`
          <button key=${id} className="tab-btn" onClick=${()=>setTab(id)}
            style=${{color:tab===id?'#16a34a':'#9ca3af',borderBottomColor:tab===id?'#16a34a':'transparent'}}>
            ${label}
          </button>`)}
      </div>

      <!-- Content -->
      <div style=${{flex:1,overflowY:'auto'}}>
        ${tab==='log'   ? html`<${LogTab}   apiKey=${apiKey} onLog=${addMeal} />` : null}
        ${tab==='today' ? html`<${TodayTab} meals=${todayMeals} goals=${goals} onDelete=${delMeal} />` : null}
        ${tab==='week'  ? html`<${WeekTab}  allMeals=${allMeals} />` : null}
      </div>

      ${showSett?html`<${Settings} onClose=${()=>setSett(false)} apiKey=${apiKey} setApiKey=${setApiKey} goals=${goals} setGoals=${setGoals} />`:null}
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
