      --light:    #dcfce7;
      --accent:   #ea580c;

      --text2:    #4b5563;
      --text3:    #9ca3af;

      --r:        16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text1); }
    .card  { background: var(--surface); border-radius: var(--r); box-shadow: var(--shadow); }
    .btn   { border: none; border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-p { background: var(--primary); color: #fff; }
    .btn-g { background: var(--surface); color: var(--text2); border: 1.5px solid var(--border) !important; }
    .btn-r { background: var(--red); color: #fff; }
    input[type=text], input[type=password], input[type=number] {
      border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px;
      font-size: 14px; color: var(--text1); outline: none; width: 100%; background: var(--surface);
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
    ::-webkit-scrollbar { width: 0; }
    .tab-btn { flex: 1; padding: 13px 6px; font-size: 13px; font-weight: 700; border: none; background: none; cursor: pointer; color: var(--text3); border-bottom: 2.5px solid transparent; transition: color .15s, border-color .15s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .seg { display: flex; background: #e8f0ea; border-radius: 14px; padding: 4px; gap: 4px; }
    .seg-btn { flex: 1; padding: 8px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text3); background: transparent; transition: all .15s; }
    .seg-btn.active { background: var(--surface); color: var(--text1); box-shadow: 0 1px 5px rgba(0,0,0,.1); }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .dot { display:inline-block;width:7px;height:7px;border-radius:99px;background:#94a3b8;animation:blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation: spin .8s linear infinite; }
    .bar-fill { transition: width .5s cubic-bezier(.4,0,.2,1); }
    .user-bubble { background: var(--primary); color:#fff; border-radius:20px 20px 4px 20px; }
    .ai-bubble   { background: #f1f5f9; color:#1e293b; border-radius:20px 20px 20px 4px; }
    .sheet-backdrop { position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50; }
    .sheet { background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.15); }
    .drag-handle { width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px; }
    .icon-btn { background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;font-size:16px;line-height:1;color:var(--text3);transition:color .15s,background .15s; }
    .icon-btn:hover { color:var(--text1);background:var(--bg); }
    .icon-btn.danger:hover { color:var(--red);background:#fef2f2; }
    .badge { display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px; }
  </style>
</head>

// ── TDEE ──────────────────────────────────────────────────────────────────────
function calcTDEE({sex,age,weight,height,activity,goal}){
  const bmr=(10*weight)+(6.25*height)-(5*age)+(sex==='male'?5:-161);
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9}[activity]||1.55;
  const adj={lose:-500,maintain:0,gain:300}[goal]||0;
  const calories=rnd(bmr*mult+adj), protein=rnd(weight*2.0);
  const fat=rnd((calories*.27)/9), carbs=Math.max(0,rnd((calories-protein*4-fat*9)/4));
  return {calories,protein,carbs,fat};
}

// ── APIs ──────────────────────────────────────────────────────────────────────
async function callClaude(messages,apiKey){
  const system=`You are a nutrition assistant. Respond ONLY with valid JSON:
{"meals":[{"name":"string","mealType":"Breakfast|Lunch|Dinner|Snack","calories":number,"protein":number,"carbs":number,"fat":number,"notes":"string"}],"message":"string"}
Round all numbers. Realistic portions. Group as one meal unless clearly separate. If unclear: {"meals":[],"message":"question"}.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system,messages})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${res.status}`);}
  const data=await res.json(), m=data.content[0].text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('Invalid response');
  return JSON.parse(m[0]);
}
async function searchOFF(query){
  const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=8&sort_by=unique_scans_n`);
  if(!res.ok) return [];
  const data=await res.json();
  return (data.products||[]).filter(p=>{const n=p.nutriments;return p.product_name?.trim()&&n&&(n['energy-kcal_100g']||n['energy_100g']);})
    .map(p=>{const n=p.nutriments,cal=n['energy-kcal_100g']||rnd((n['energy_100g']||0)/4.184),sg=parseFloat(p.serving_size)||null;
      return{id:'off_'+(p.code||Math.random()),name:p.product_name.trim(),cat:'Database',cal:rnd(cal),
        p:rnd(n['proteins_100g']||0),c:rnd(n['carbohydrates_100g']||0),f:rnd(n['fat_100g']||0),
        sv:sg?[{l:`1 serving (${p.serving_size})`,g:sg},{l:'100 g',g:100}]:[{l:'100 g',g:100}],source:'off'};}).slice(0,6);
}

  const pct=Math.min(100,rnd((value/goal)*100)), over=value>goal;
  return html`
    <div style=${{background:cfg.light,borderRadius:14,padding:'11px 14px'}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>

        <span style=${{fontSize:12,fontWeight:600,color:over?'var(--red)':cfg.color}}>${value}g <span style=${{color:'var(--text3)',fontWeight:400}}>/ ${goal}g</span></span>

      <div style=${{height:8,background:'rgba(0,0,0,.07)',borderRadius:99,overflow:'hidden'}}>

            : html`<button className="icon-btn danger" onClick=${()=>setConfirmDel(true)} title="Delete">🗑️</button>`}
        </div>

        <p style=${{fontSize:15,fontWeight:700,color:'var(--text1)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${meal.name}</p>

  const lastMealIdx=msgs.reduce((a,m,i)=>m.meals?.length?i:a,-1);

                        ${msg.meals.map((m,mi)=>{

// ── WeekTab ───────────────────────────────────────────────────────────────────
const DAY_EMOJI=['🌙','🌟','🌤️','🌈','⚡','🎉','😴'];
function WeekTab({allMeals,plans,onSavePlan,onDeletePlan,onUsePlan,onDelete,onEdit,goals}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [savingDate,setSavingDate]=useState(null), [planName,setPlanName]=useState('');
  const today=new Date(), dow=today.getDay();
  const monday=new Date(today); monday.setDate(today.getDate()-(dow===0?6:dow-1)+weekOffset*7);
  const weekDates=DAYS.map((_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;});
  const ts=todayISO();
  const weekMeals=allMeals.filter(m=>weekDates.includes(m.date));
  const daysWithMeals=weekDates.filter(d=>allMeals.some(m=>m.date===d));
  const weekTotalCal=weekMeals.reduce((s,m)=>s+m.calories,0);
  const avgDailyCal=daysWithMeals.length?rnd(weekTotalCal/daysWithMeals.length):0;
  const daysOnGoal=weekDates.filter(d=>{const c=allMeals.filter(m=>m.date===d).reduce((s,m)=>s+m.calories,0);return c>0&&c<=goals.calories;}).length;
  const fmtD=iso=>{const[,m,d]=iso.split('-');return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+d}`;};
  const weekLabel=weekOffset===0?'This Week':weekOffset===-1?'Last Week':`${fmtD(weekDates[0])} – ${fmtD(weekDates[6])}`;
  const doSave=()=>{
    if(!planName.trim()) return;
    const dayMeals=allMeals.filter(m=>m.date===savingDate).map(({name,mealType,calories,protein,carbs,fat,notes})=>({name,mealType,calories,protein,carbs,fat,notes}));
    onSavePlan(planName.trim(),dayMeals);
    setSavingDate(null); setPlanName('');
  };
  return html`
    <div style=${{padding:16}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <button onClick=${()=>setWeekOffset(o=>o-1)} style=${{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,padding:'5px 14px',cursor:'pointer',fontSize:18,fontWeight:700,color:'var(--text2)'}}>‹</button>
        <p style=${{fontSize:15,fontWeight:800,color:'var(--text1)',margin:0}}>📅 ${weekLabel}</p>
        <button onClick=${()=>setWeekOffset(o=>Math.min(0,o+1))} style=${{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,padding:'5px 14px',cursor:weekOffset>=0?'default':'pointer',fontSize:18,fontWeight:700,color:weekOffset>=0?'var(--border)':'var(--text2)'}} disabled=${weekOffset>=0}>›</button>
      </div>
      ${daysWithMeals.length?html`
      <div style=${{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
        <div className="card" style=${{padding:'10px',textAlign:'center'}}>
          <p style=${{fontSize:11,color:'var(--text3)',margin:'0 0 2px'}}>Avg/day</p>
          <p style=${{fontSize:17,fontWeight:800,color:'var(--accent)',margin:0}}>${avgDailyCal.toLocaleString()}</p>
          <p style=${{fontSize:10,color:'var(--text3)',margin:0}}>kcal</p>
        </div>
        <div className="card" style=${{padding:'10px',textAlign:'center'}}>
          <p style=${{fontSize:11,color:'var(--text3)',margin:'0 0 2px'}}>On goal</p>
          <p style=${{fontSize:17,fontWeight:800,color:'var(--primary)',margin:0}}>${daysOnGoal}/${daysWithMeals.length}</p>
          <p style=${{fontSize:10,color:'var(--text3)',margin:0}}>days</p>
        </div>
        <div className="card" style=${{padding:'10px',textAlign:'center'}}>
          <p style=${{fontSize:11,color:'var(--text3)',margin:'0 0 2px'}}>Total</p>
          <p style=${{fontSize:17,fontWeight:800,color:'var(--text1)',margin:0}}>${weekTotalCal.toLocaleString()}</p>
          <p style=${{fontSize:10,color:'var(--text3)',margin:0}}>kcal</p>
        </div>
      </div>`:null}
      ${DAYS.map((dayName,i)=>{
        const date=weekDates[i], dayMeals=allMeals.filter(m=>m.date===date);
        const totalCal=dayMeals.reduce((s,m)=>s+m.calories,0), isToday=date===ts;
        return html`
          <div key=${dayName} className="card" style=${{marginBottom:8,overflow:'hidden',outline:isToday?'2px solid var(--primary)':'2px solid transparent'}}>
            <div style=${{padding:'12px 14px'}}>
              <!-- Day header -->
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:dayMeals.length?8:0}}>
                <div style=${{display:'flex',alignItems:'center',gap:8}}>
                  <span style=${{fontSize:18}}>${DAY_EMOJI[i]}</span>
                  <span style=${{fontSize:14,fontWeight:800,color:isToday?'var(--primary)':'var(--text1)'}}>${dayName}</span>
                  ${isToday?html`<span className="badge" style=${{background:'var(--light)',color:'var(--primary)'}}>Today</span>`:null}
                </div>
                <div style=${{display:'flex',alignItems:'center',gap:8}}>
                  ${dayMeals.length?html`<span style=${{fontSize:14,fontWeight:800,color:'var(--accent)'}}>${totalCal.toLocaleString()} kcal</span>`:html`<span style=${{fontSize:13,color:'var(--border)'}}>—</span>`}
                  ${dayMeals.length?html`<button className="icon-btn" onClick=${()=>{setSavingDate(date);setPlanName(dayName+' plan');}} title="Save as plan" style=${{fontSize:14}}>💾</button>`:null}
                </div>
              </div>
              <!-- Meals -->
              ${dayMeals.length?html`
                <div style=${{display:'flex',flexDirection:'column',gap:5}}>
                  ${dayMeals.map(m=>html`
                    <div key=${m.id} style=${{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                      <span style=${{color:MEAL_META[m.mealType].fg,flexShrink:0}}>${MEAL_META[m.mealType].emoji}</span>
                      <span style=${{flex:1,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${m.name}</span>
                      <span style=${{color:'var(--accent)',fontWeight:700,flexShrink:0,marginRight:2}}>${m.calories}</span>
                      <button className="icon-btn" onClick=${()=>onEdit(m)} style=${{fontSize:12,padding:'2px 4px'}}>✏️</button>
                      <button className="icon-btn danger" onClick=${()=>onDelete(m.id)} style=${{fontSize:12,padding:'2px 4px'}}>🗑️</button>
                    </div>`)}
                </div>`
              :html`<p style=${{fontSize:12,color:'var(--border)'}}>No meals logged</p>`}
            </div>
            <!-- Inline save plan input -->
            ${savingDate===date?html`
              <div style=${{padding:'10px 14px',borderTop:'1px solid var(--bg)',background:'var(--bg)',display:'flex',gap:8}}>
                <input type="text" value=${planName} onInput=${e=>setPlanName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&doSave()} placeholder="Name this plan…" style=${{flex:1,padding:'8px 12px',fontSize:13}} />
                <button className="btn btn-p" style=${{padding:'8px 14px',fontSize:13}} onClick=${doSave}>Save</button>
                <button className="btn btn-g" style=${{padding:'8px 12px',fontSize:13}} onClick=${()=>setSavingDate(null)}>✕</button>
              </div>`:null}
          </div>`;
      })}

      <!-- Saved Plans -->
      <div style=${{marginTop:20}}>
        <p style=${{fontSize:16,fontWeight:800,color:'var(--text1)',marginBottom:10}}>📋 Saved Plans</p>
        ${plans.length===0?html`
          <div className="card" style=${{padding:'24px',textAlign:'center'}}>
            <p style=${{fontSize:32,marginBottom:8}}>📋</p>
            <p style=${{fontSize:14,fontWeight:600,color:'var(--text2)',margin:'0 0 4px'}}>No saved plans yet</p>
            <p style=${{fontSize:13,color:'var(--text3)'}}>Tap 💾 on any day with meals to save it as a reusable plan</p>
          </div>`
        :html`<div>
          ${plans.map(plan=>html`
            <div key=${plan.id} className="card" style=${{padding:'13px 15px',marginBottom:8}}>
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div>
                  <p style=${{fontSize:15,fontWeight:800,color:'var(--text1)',margin:'0 0 3px'}}>${plan.name}</p>
                  <p style=${{fontSize:12,color:'var(--text3)'}}>${plan.meals.length} meals · saved ${plan.createdAt}</p>
                </div>
                <button className="icon-btn danger" onClick=${()=>onDeletePlan(plan.id)}>🗑️</button>
              </div>
              <div style=${{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>
                ${plan.meals.map((m,i)=>html`<span key=${i} style=${{fontSize:12,padding:'2px 8px',borderRadius:99,background:'var(--bg)',color:'var(--text2)',fontWeight:500}}>${m.name}</span>`)}
              </div>
              <button className="btn btn-p" style=${{width:'100%',padding:'10px'}} onClick=${()=>onUsePlan(plan)}>▶ Use this plan</button>
            </div>`)}
        </div>`}
      </div>
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
const ACT=[{id:'sedentary',l:'🛋️ Sedentary',s:'Little/no exercise'},{id:'light',l:'🚶 Light',s:'1–3 days/wk'},{id:'moderate',l:'🏃 Moderate',s:'3–5 days/wk'},{id:'active',l:'💪 Active',s:'6–7 days/wk'},{id:'veryactive',l:'🏋️ Very Active',s:'Hard daily training'}];
const GOPT=[{id:'lose',l:'📉 Lose Weight',s:'−500 kcal/day'},{id:'maintain',l:'⚖️ Maintain',s:'Eat at TDEE'},{id:'gain',l:'📈 Gain Muscle',s:'+300 kcal/day'}];
function Settings({onClose,apiKey,setApiKey,goals,setGoals}){
  const [key,setKey]=useState(apiKey), [g,setG]=useState(goals);
  const [calc,setCalc]=useState(()=>load('tdeeCalc',{sex:'male',age:30,weight:75,height:175,activity:'moderate',goal:'maintain'}));
  const [result,setResult]=useState(null);
  const [saved,setSaved]=useState(false);
  const saveGoals=newG=>{setGoals(newG);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const updateCalc=v=>{const n={...calc,...v};setCalc(n);persist('tdeeCalc',n);};
  const calculate=()=>{const r=calcTDEE(calc);setResult(r);setG(r);saveGoals(r);};
  const ok=()=>{setApiKey(key.trim());onClose()};
  const exportData=()=>{
    const data={meals:load('meals',[]),goals:load('goals',GOALS_DEF),plans:load('plans',[]),groceries:load('groceries',[]),exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`meal-tracker-${todayISO()}.json`; a.click(); URL.revokeObjectURL(url);
  };
  const importData=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.meals) persist('meals',data.meals);
        if(data.goals) persist('goals',data.goals);
        if(data.plans) persist('plans',data.plans);
        if(data.groceries) persist('groceries',data.groceries);
        window.location.reload();
      }catch{alert('Invalid backup file.');}
    };
    reader.readAsText(file);
  };
  return html`
    <div className="sheet-backdrop" onClick=${e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="drag-handle"></div>
        <h2 style=${{fontSize:20,fontWeight:900,color:'var(--text1)',marginBottom:20}}>⚙️ Settings</h2>

        <!-- API key -->
        <div style=${{marginBottom:20,padding:14,background:'var(--bg)',borderRadius:14}}>
          <label style=${{fontSize:13,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:6}}>🤖 Anthropic API Key <span style=${{fontWeight:400,color:'var(--text3)'}}>— optional, enables chat</span></label>
          <input type="password" value=${key} onInput=${e=>setKey(e.target.value)} placeholder="sk-ant-…" />
          <p style=${{fontSize:11,color:'var(--text3)',marginTop:5}}>Free tier at console.anthropic.com · Stored only in your browser</p>
        </div>

        <!-- TDEE calculator -->
        <div style=${{marginBottom:20,padding:14,background:'linear-gradient(135deg,#f0fdf4,#f0f9ff)',borderRadius:14,border:'2px solid var(--light)'}}>
          <h3 style=${{fontSize:15,fontWeight:800,color:'var(--deep)',marginBottom:3}}>🧮 Calculate My Goals</h3>
          <p style=${{fontSize:12,color:'var(--text3)',marginBottom:14}}>Mifflin-St Jeor formula — enter your details below</p>
          <div style=${{display:'flex',gap:8,marginBottom:12}}>
            ${[['male','👨 Male'],['female','👩 Female']].map(([id,l])=>html`
              <button key=${id} className="btn" onClick=${()=>updateCalc({sex:id})} style=${{flex:1,border:'2px solid',borderColor:calc.sex===id?'var(--primary)':'var(--border)',background:calc.sex===id?'var(--primary)':'var(--surface)',color:calc.sex===id?'#fff':'var(--text2)'}}>${l}</button>`)}
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
            ${[['age','Age','yrs'],['weight','Weight','kg'],['height','Height','cm']].map(([k,l,u])=>html`
              <div key=${k}>
                <label style=${{fontSize:11,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.4px'}}>${l}</label>
                <div style=${{position:'relative'}}>
                  <input type="number" value=${calc[k]} onBlur=${e=>updateCalc({[k]:parseFloat(e.target.value)||0})} style=${{paddingRight:28}} />
                  <span style=${{position:'absolute',right:9,top:'50%',transform:'translateY(-50%)',fontSize:11,color:'var(--text3)'}}>${u}</span>
                </div>
              </div>`)}
          </div>
          <div style=${{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
            ${ACT.map(o=>html`
              <button key=${o.id} className="btn" onClick=${()=>updateCalc({activity:o.id})} style=${{textAlign:'left',padding:'8px 12px',border:'2px solid',borderColor:calc.activity===o.id?'var(--primary)':'var(--border)',background:calc.activity===o.id?'#f0fdf4':'var(--surface)'}}>
                <span style=${{fontSize:13,fontWeight:700,color:calc.activity===o.id?'var(--primary)':'var(--text1)'}}>${o.l}</span>
                <span style=${{fontSize:11,color:'var(--text3)',marginLeft:6}}>${o.s}</span>
              </button>`)}
          </div>
          <div style=${{display:'flex',gap:6,marginBottom:12}}>
            ${GOPT.map(o=>html`
              <button key=${o.id} className="btn" onClick=${()=>updateCalc({goal:o.id})} style=${{flex:1,padding:'9px 4px',textAlign:'center',border:'2px solid',borderColor:calc.goal===o.id?'var(--primary)':'var(--border)',background:calc.goal===o.id?'var(--primary)':'var(--surface)',color:calc.goal===o.id?'#fff':'var(--text2)',fontSize:12}}>
                <p style=${{fontWeight:700,margin:'0 0 2px',fontSize:12}}>${o.l}</p><p style=${{fontSize:10,opacity:.8,margin:0}}>${o.s}</p>
              </button>`)}
          </div>
          <button className="btn btn-p" style=${{width:'100%',padding:'12px',fontSize:14,background:'var(--deep)'}} onClick=${calculate}>⚡ Calculate & Set My Goals</button>
          ${result?html`
            <div style=${{marginTop:10,padding:'10px 12px',background:'var(--surface)',borderRadius:10,border:'1px solid var(--light)'}}>
              <p style=${{fontSize:12,fontWeight:700,color:'var(--primary)',margin:'0 0 6px'}}>✅ Goals updated!</p>
              <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,textAlign:'center'}}>
                ${[['🔥',result.calories,'var(--accent)'],['💪',result.protein+'g','#3b82f6'],['🌾',result.carbs+'g','#f97316'],['🥑',result.fat+'g','#eab308']].map(([l,v,c])=>html`
                  <div key=${l}><p style=${{fontSize:10,color:'var(--text3)',margin:'0 0 2px'}}>${l}</p><p style=${{fontSize:14,fontWeight:800,color:c,margin:0}}>${v}</p></div>`)}
              </div>
            </div>`:null}
        </div>

        <!-- Manual goals -->
        <div style=${{marginBottom:20,padding:14,background:'var(--bg)',borderRadius:14}}>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <h3 style=${{fontSize:14,fontWeight:700,color:'var(--text2)',margin:0}}>🎯 Daily Goals</h3>
            ${saved?html`<span style=${{fontSize:12,color:'var(--primary)',fontWeight:700}}>✓ Saved</span>`:null}
          </div>
          ${[['calories','🔥 Calories','kcal'],['protein','💪 Protein','g'],['carbs','🌾 Carbs','g'],['fat','🥑 Fat','g']].map(([k,l,u])=>html`
            <div key=${k} style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <label style=${{fontSize:13,fontWeight:600,color:'var(--text1)'}}>${l} (${u})</label>
              <input type="number" value=${g[k]||''} placeholder="0"
                onInput=${e=>setG(p=>({...p,[k]:e.target.value}))}
                onBlur=${e=>{const v=parseInt(e.target.value)||0;const newG={...g,[k]:v};setG(newG);saveGoals(newG);}}
                style=${{width:90,textAlign:'right'}} />
            </div>`)}
        </div>
        <!-- Backup & Restore -->
        <div style=${{marginBottom:20,padding:14,background:'var(--bg)',borderRadius:14}}>
          <h3 style=${{fontSize:14,fontWeight:700,color:'var(--text2)',marginBottom:6}}>💾 Backup & Restore</h3>
          <p style=${{fontSize:11,color:'var(--text3)',marginBottom:10,lineHeight:1.5}}>Export all your meals, goals & plans as a file. Import to restore on any device.</p>
          <div style=${{display:'flex',gap:8}}>
            <button className="btn btn-g" style=${{flex:1,fontSize:13}} onClick=${exportData}>⬇️ Export</button>
            <label className="btn btn-g" style=${{flex:1,fontSize:13,textAlign:'center',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
              ⬆️ Import
              <input type="file" accept=".json" style=${{display:'none'}} onChange=${importData} />
            </label>
          </div>
        </div>
        <div style=${{display:'flex',gap:10}}>
          <button className="btn btn-g" style=${{flex:1}} onClick=${onClose}>Cancel</button>
          <button className="btn btn-p" style=${{flex:2}} onClick=${ok}>💾 Save</button>
        </div>
      </div>
    </div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('log');
  const [showSett,setSett]=useState(false);
  const [apiKey,setApiKey_]=useState(()=>load('apiKey',''));
  const [goals,setGoals_]=useState(()=>load('goals',GOALS_DEF));
  const [allMeals,setAllMeals]=useState(()=>load('meals',[]));
  const [plans,setPlans_]=useState(()=>load('plans',[]));
  const [groceries,setGroceries_]=useState(()=>load('groceries',[]));
  const [exercises,setExercises_]=useState(()=>load('exercises',[]));
  const [favorites,setFavs_]=useState(()=>load('favorites',[]));
  const [editingMeal,setEditingMeal]=useState(null);
  const [groceryPrompt,setGroceryPrompt]=useState(null);

  const ts=todayISO(), todayMeals=allMeals.filter(m=>m.date===ts);
  const todayExercises=exercises.filter(e=>e.date===ts);
  const todayCal=todayMeals.reduce((s,m)=>s+m.calories,0), calPct=Math.min(100,rnd((todayCal/goals.calories)*100)), calPctReal=rnd((todayCal/goals.calories)*100);

  const setApiKey=k=>{setApiKey_(k);persist('apiKey',k);};
  const setGoals=g=>{setGoals_(g);persist('goals',g);};
  const addMeal=m=>setAllMeals(p=>{const n=[...p,m];persist('meals',n);return n;});
  const delMeal=id=>setAllMeals(p=>{const n=p.filter(m=>m.id!==id);persist('meals',n);return n;});
  const editMeal=updated=>{ setAllMeals(p=>{const n=p.map(m=>m.id===updated.id?updated:m);persist('meals',n);return n;}); setEditingMeal(null); };
  const addExercise=e=>setExercises_(p=>{const n=[...p,e];persist('exercises',n);return n;});
  const delExercise=id=>setExercises_(p=>{const n=p.filter(e=>e.id!==id);persist('exercises',n);return n;});
  const toggleFav=id=>setFavs_(p=>{const n=p.includes(id)?p.filter(x=>x!==id):[...p,id];persist('favorites',n);return n;});
  const savePlan=(name,meals)=>{const n=[...plans,{id:newId(),name,createdAt:ts,meals}];setPlans_(n);persist('plans',n);};
  const deletePlan=id=>{const n=plans.filter(p=>p.id!==id);setPlans_(n);persist('plans',n);};
  const usePlan=plan=>setGroceryPrompt(plan);
  const applyPlan=(plan,addGrocery)=>{
    const time=nowTime();
    plan.meals.forEach(m=>addMeal({...m,id:newId(),date:ts,time,source:'plan'}));
    if(addGrocery) plan.meals.forEach(m=>addGroceryItem(m.name,`From: ${plan.name}`));
    setGroceryPrompt(null); setTab('today');
  };
  const addGroceryItem=(text,source='')=>{const n=[...groceries,{id:newId(),text,checked:false,source}];setGroceries_(n);persist('groceries',n);};
  const toggleGrocery=id=>{const n=groceries.map(g=>g.id===id?{...g,checked:!g.checked}:g);setGroceries_(n);persist('groceries',n);};
  const deleteGrocery=id=>{const n=groceries.filter(g=>g.id!==id);setGroceries_(n);persist('groceries',n);};
  const clearChecked=()=>{const n=groceries.filter(g=>!g.checked);setGroceries_(n);persist('groceries',n);};

  useEffect(()=>{if(!apiKey) setSett(true);},[]);

  const TABS=[['log','🍴 Log'],['today','📊 Today'],['week','📅 Week'],['grocery','🛒 Grocery']];

  return html`
    <div style=${{maxWidth:480,margin:'0 auto',minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <!-- Header -->
      <div style=${{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'12px 16px',position:'sticky',top:0,zIndex:10}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h1 style=${{fontSize:20,fontWeight:900,color:'var(--deep)',letterSpacing:'-0.5px'}}>🥗 Meal Tracker</h1>
            <p style=${{fontSize:12,color:'var(--text3)',marginTop:1}}>${todayCal.toLocaleString()} / ${goals.calories.toLocaleString()} kcal today</p>
          </div>
          <div style=${{display:'flex',alignItems:'center',gap:10}}>
            <div style=${{position:'relative',width:44,height:44}}>
              <svg width="44" height="44" viewBox="0 0 44 44">
                <circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" strokeWidth="4"/>
                <circle cx="22" cy="22" r="18" fill="none"
                  stroke=${todayCal>goals.calories?'#f87171':'var(--primary)'} strokeWidth="4"
                  strokeDasharray=${calPct>=100?'113.1 0':`${(calPct/100*113.1).toFixed(1)} 113.1`}
                  strokeDashoffset="28.3" strokeLinecap="round"/>
              </svg>
              <div style=${{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'var(--deep)'}}>${calPctReal}%</div>
            </div>
            <button onClick=${()=>setSett(true)} style=${{background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:11,padding:'8px 10px',cursor:'pointer',fontSize:16,lineHeight:1}}>⚙️</button>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div style=${{background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',padding:'0 4px'}}>
        ${TABS.map(([id,label])=>html`
          <button key=${id} className=${'tab-btn'+(tab===id?' active':'')} onClick=${()=>setTab(id)}>${label}</button>`)}
      </div>

      <!-- Content -->
      <div style=${{flex:1,overflowY:'auto'}}>
        ${tab==='log'    ? html`<${LogTab}     apiKey=${apiKey} onLog=${addMeal} allMeals=${allMeals} favorites=${favorites} onToggleFav=${toggleFav} />` : null}
        ${tab==='today'  ? html`<${TodayTab}   meals=${todayMeals} goals=${goals} onDelete=${delMeal} onEdit=${setEditingMeal} setTab=${setTab} exercises=${todayExercises} onAddExercise=${addExercise} onDelExercise=${delExercise} />` : null}
        ${tab==='week'   ? html`<${WeekTab}    allMeals=${allMeals} plans=${plans} onSavePlan=${savePlan} onDeletePlan=${deletePlan} onUsePlan=${usePlan} onDelete=${delMeal} onEdit=${setEditingMeal} goals=${goals} />` : null}
        ${tab==='grocery'? html`<${GroceryTab} items=${groceries} onAdd=${addGroceryItem} onToggle=${toggleGrocery} onDelete=${deleteGrocery} onClearChecked=${clearChecked} />` : null}
      </div>

      ${editingMeal ? html`<${EditMealModal} meal=${editingMeal} onSave=${editMeal} onClose=${()=>setEditingMeal(null)} />` : null}
      ${groceryPrompt ? html`<${GroceryPromptModal} plan=${groceryPrompt} onConfirm=${addGrocery=>applyPlan(groceryPrompt,addGrocery)} onClose=${()=>setGroceryPrompt(null)} />` : null}
      ${showSett ? html`<${Settings} onClose=${()=>setSett(false)} apiKey=${apiKey} setApiKey=${setApiKey} goals=${goals} setGoals=${setGoals} />` : null}
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
